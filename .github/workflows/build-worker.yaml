name: Docker Build & Smoke Test

on:
  workflow_call:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate .env
        run: |
          cat > .env << 'EOF'
          USER_NAME=ci
          USER_GROUP=ci
          USER_UID=1000
          USER_GID=1000
          HARDWARE=x86_64
          DOCKER_HUB_USER=ci
          GPU_ENABLED=false
          IMAGE_NAME=ros_noetic
          WS_PATH=/tmp/workspace
          EOF
          mkdir -p /tmp/workspace

      - name: Build test stage (includes smoke tests)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          push: false
          build-args: |
            ROS_DISTRO=noetic
            ROS_TAG=ros-base
            UBUNTU_CODENAME=focal
            USER=ci
            GROUP=ci
            UID=1000
            GID=1000
            HARDWARE=x86_64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build devel stage
        uses: docker/build-push-action@v6
        with:
          context: .
          target: devel
          push: false
          build-args: |
            ROS_DISTRO=noetic
            ROS_TAG=ros-base
            UBUNTU_CODENAME=focal
            USER=ci
            GROUP=ci
            UID=1000
            GID=1000
            HARDWARE=x86_64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build runtime stage
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: false
          build-args: |
            ROS_DISTRO=noetic
            ROS_TAG=ros-base
            UBUNTU_CODENAME=focal
            USER=ci
            GROUP=ci
            UID=1000
            GID=1000
          cache-from: type=gha
          cache-to: type=gha,mode=max
